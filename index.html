<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klett Vocabulary Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #24242f;
    --accent: #7c6af7;
    --accent2: #f7a26a;
    --accent3: #6af7b8;
    --text: #f0eeff;
    --muted: #8888aa;
    --correct: #4cdb8a;
    --wrong: #f76a6a;
    --border: rgba(124,106,247,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(124,106,247,0.15) 0%, transparent 60%);
    pointer-events: none;
  }

  .app {
    width: 100%;
    max-width: 680px;
    position: relative;
  }

  /* ---- SCREENS ---- */
  .screen { display: none; animation: fadeIn 0.35s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ---- HEADER ---- */
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 32px;
    opacity: 0.8;
  }

  /* ---- HOME ---- */
  .home-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 800;
    line-height: 1.1;
    text-align: center;
    margin-bottom: 8px;
  }
  .home-sub {
    text-align: center;
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 40px;
  }

  /* ---- SECTION CARDS ---- */
  .section-grid {
    display: grid;
    gap: 10px;
  }

  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-card:hover {
    background: var(--surface2);
    border-color: rgba(124,106,247,0.5);
    transform: translateX(4px);
  }
  .section-card .sc-left { display: flex; flex-direction: column; gap: 4px; }
  .section-card .sc-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }
  .section-card .sc-name {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
  }
  .section-card .sc-count {
    font-size: 13px;
    color: var(--muted);
  }
  .section-card .arrow {
    color: var(--accent);
    font-size: 20px;
    opacity: 0.6;
  }

  /* ---- QUIZ SCREEN ---- */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .quiz-back {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quiz-back:hover { background: var(--surface2); }

  .quiz-stats {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    font-weight: 500;
  }
  .stat-pill.correct-stat { color: var(--correct); border-color: rgba(76,219,138,0.3); }
  .stat-pill.wrong-stat { color: var(--wrong); border-color: rgba(247,106,106,0.3); }

  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 32px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .quiz-section-label {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 20px;
  }
  .question-num {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .question-text {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    font-weight: 700;
    line-height: 1.3;
  }

  /* Multiple choice */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 480px) { .options-grid { grid-template-columns: 1fr; } }

  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
  }
  .option-btn:hover:not(:disabled) {
    background: var(--surface2);
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .option-btn.correct {
    background: rgba(76,219,138,0.15);
    border-color: var(--correct);
    color: var(--correct);
  }
  .option-btn.wrong {
    background: rgba(247,106,106,0.12);
    border-color: var(--wrong);
    color: var(--wrong);
  }
  .option-btn:disabled { cursor: default; }

  /* Text input */
  .text-input-wrap {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .text-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 200px;
  }
  .text-input:focus { border-color: var(--accent); }
  .text-input.correct { border-color: var(--correct); background: rgba(76,219,138,0.1); }
  .text-input.wrong { border-color: var(--wrong); background: rgba(247,106,106,0.08); }

  .submit-btn {
    background: var(--accent);
    border: none;
    color: white;
    border-radius: 12px;
    padding: 14px 24px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .submit-btn:hover { background: #9183f9; transform: translateY(-1px); }

  /* Feedback */
  .feedback {
    margin-top: 14px;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    display: none;
  }
  .feedback.show { display: block; animation: fadeIn 0.2s; }
  .feedback.correct { background: rgba(76,219,138,0.12); color: var(--correct); border: 1px solid rgba(76,219,138,0.3); }
  .feedback.wrong { background: rgba(247,106,106,0.1); color: var(--wrong); border: 1px solid rgba(247,106,106,0.25); }

  /* Next btn */
  .next-btn {
    width: 100%;
    margin-top: 12px;
    background: linear-gradient(135deg, var(--accent), #9183f9);
    border: none;
    color: white;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    transition: opacity 0.2s;
    letter-spacing: 0.04em;
  }
  .next-btn:hover { opacity: 0.9; }
  .next-btn.show { display: block; animation: fadeIn 0.3s; }

  /* ---- RESULT SCREEN ---- */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
  }
  .result-emoji { font-size: 64px; margin-bottom: 16px; }
  .result-title {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .result-sub { color: var(--muted); margin-bottom: 32px; }
  .result-score {
    font-family: 'Syne', sans-serif;
    font-size: 4rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 24px;
  }
  .result-details {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 32px;
  }
  .result-detail { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .rd-num { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; }
  .rd-label { font-size: 12px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .rd-correct .rd-num { color: var(--correct); }
  .rd-wrong .rd-num { color: var(--wrong); }

  .restart-btn {
    background: var(--accent);
    border: none;
    color: white;
    border-radius: 12px;
    padding: 14px 32px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin: 6px;
    transition: all 0.2s;
  }
  .restart-btn:hover { background: #9183f9; }
  .home-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 14px 32px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin: 6px;
    transition: all 0.2s;
  }
  .home-btn:hover { background: var(--surface); }

  /* ---- DIRECTION TOGGLE ---- */
  .direction-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 5px;
    margin-bottom: 28px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }
  .dir-btn {
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dir-btn.active {
    background: var(--accent);
    color: white;
    font-weight: 600;
  }
  .dir-btn:not(.active):hover { color: var(--text); }

  .quiz-dir-badge {
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 20px;
    padding: 3px 10px;
    margin-left: 8px;
    letter-spacing: 0.05em;
  }

  /* ---- PROGRESS BADGES ON SECTION CARDS ---- */
  .sc-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
  .sc-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .sc-badge.perfect { background: rgba(76,219,138,0.18); color: #4cdb8a; border: 1px solid rgba(76,219,138,0.35); }
  .sc-badge.done    { background: rgba(124,106,247,0.18); color: #9183f9; border: 1px solid rgba(124,106,247,0.35); }
  .sc-badge.errors  { background: rgba(247,162,106,0.18); color: #f7a26a; border: 1px solid rgba(247,162,106,0.35); }

  /* ---- RESULT SCREEN IMPROVEMENTS ---- */
  .result-perfect-banner {
    background: linear-gradient(135deg, rgba(76,219,138,0.2), rgba(76,219,138,0.05));
    border: 1px solid rgba(76,219,138,0.4);
    border-radius: 12px;
    padding: 12px 20px;
    color: #4cdb8a;
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 20px;
    display: none;
  }
  .result-perfect-banner.show { display: block; animation: fadeIn 0.4s; }

  .result-prev {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .result-prev span { color: var(--text); font-weight: 600; }

  /* ---- STATS MODAL ---- */
  .stats-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 50%;
    width: 48px;
    height: 48px;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .stats-btn:hover { background: var(--surface2); border-color: var(--accent); }

  .stats-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .stats-overlay.open { display: flex; animation: fadeIn 0.2s; }
  .stats-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 500px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .stats-modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .stats-modal-sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .stats-close {
    float: right;
    background: var(--surface2);
    border: none;
    color: var(--text);
    border-radius: 8px;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 14px;
  }
  .stats-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .stats-row:last-child { border-bottom: none; }
  .stats-row-left { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .stats-row-label { font-size: 11px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }
  .stats-row-name { font-size: 14px; font-weight: 500; }
  .stats-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .stats-score-big { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; }
  .stats-score-big.green { color: var(--correct); }
  .stats-score-big.orange { color: var(--accent2); }
  .stats-score-big.red { color: var(--wrong); }
  .stats-attempts { font-size: 12px; color: var(--muted); }
  .stats-empty { text-align: center; color: var(--muted); padding: 30px; font-size: 14px; }
  .stats-reset-btn {
    width: 100%;
    margin-top: 16px;
    background: transparent;
    border: 1px solid rgba(247,106,106,0.3);
    color: var(--wrong);
    border-radius: 10px;
    padding: 10px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .stats-reset-btn:hover { background: rgba(247,106,106,0.1); }
</style>
</head>
<body>
<div class="app">

  <!-- HOME -->
  <div class="screen active" id="homeScreen">
    <div class="logo">Klett · Vocabulary Quiz</div>
    <div class="home-title">Ready to<br>Learn? 🎯</div>
    <div class="home-sub">Choose a section to practice vocabulary</div>
    <div class="direction-toggle">
      <button class="dir-btn active" id="dirEN" onclick="setDir('en')">🇬🇧 EN → DE</button>
      <button class="dir-btn" id="dirDE" onclick="setDir('de')">🇩🇪 DE → EN</button>
    </div>
    <div class="section-grid" id="sectionGrid"></div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="quizScreen">
    <div class="quiz-header">
      <button class="quiz-back" onclick="goHome()">← Back</button>
      <div class="quiz-stats">
        <span class="stat-pill correct-stat" id="correctCount">✓ 0</span>
        <span class="stat-pill wrong-stat" id="wrongCount">✗ 0</span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="quiz-section-label" id="quizSectionLabel"></div>
    <div class="question-card">
      <div class="question-num" id="questionNum"></div>
      <div class="question-text" id="questionText"></div>
    </div>
    <div id="answersArea"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
  </div>

  <!-- RESULT -->
  <div class="screen" id="resultScreen">
    <div class="result-card">
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <div class="result-title" id="resultTitle">Well done!</div>
      <div class="result-sub" id="resultSub"></div>
      <div class="result-perfect-banner" id="perfectBanner">🌟 Perfekte Runde – kein einziger Fehler!</div>
      <div class="result-score" id="resultScore">0%</div>
      <div class="result-prev" id="resultPrev"></div>
      <div class="result-details">
        <div class="result-detail rd-correct">
          <div class="rd-num" id="finalCorrect">0</div>
          <div class="rd-label">Richtig</div>
        </div>
        <div class="result-detail rd-wrong">
          <div class="rd-num" id="finalWrong">0</div>
          <div class="rd-label">Falsch</div>
        </div>
        <div class="result-detail">
          <div class="rd-num" id="finalTotal">0</div>
          <div class="rd-label">Gesamt</div>
        </div>
      </div>
      <div>
        <button class="restart-btn" onclick="restartQuiz()">Nochmal</button>
        <button class="home-btn" onclick="goHome()">Alle Sektionen</button>
      </div>
    </div>
  </div>

</div>

<!-- Stats Button -->
<button class="stats-btn" onclick="openStats()" title="Fortschritt">📊</button>

<!-- Stats Modal -->
<div class="stats-overlay" id="statsOverlay" onclick="closeStatsOutside(event)">
  <div class="stats-modal" id="statsModal">
    <button class="stats-close" onclick="closeStats()">✕ Schließen</button>
    <h2>Dein Fortschritt</h2>
    <div class="stats-modal-sub">Alle abgeschlossenen Sektionen</div>
    <div id="statsContent"></div>
    <button class="stats-reset-btn" onclick="resetStats()">🗑 Fortschritt zurücksetzen</button>
  </div>
</div>
<script>
// ===================== VOCABULARY DATA =====================
const SECTIONS = [
  {
    id: "ac1",
    label: "Across Cultures 1",
    name: "School Life",
    color: "#7c6af7",
    questions: [
      {q:"hallway",a:"Flur / Korridor",type:"mc",wrong:["Labor","Nachsitzen","Schulleiter"]},
      {q:"laboratory",a:"Labor",type:"mc",wrong:["Flur","Vorort","Nachsitzen"]},
      {q:"to skip (class)",a:"den Unterricht schwänzen",type:"mc",wrong:["mogeln","suspendiert werden","auslassen"]},
      {q:"to cheat",a:"mogeln / betrügen",type:"mc",wrong:["schwänzen","bestellen","verdienen"]},
      {q:"to get caught",a:"erwischt werden",type:"mc",wrong:["verdienen","auslassen","bestellen"]},
      {q:"principal (AE)",a:"Schulleiter/-in",type:"mc",wrong:["Laborant","Korridor","Ausschluss"]},
      {q:"to be suspended",a:"zeitweilig vom Unterricht ausgeschlossen werden",type:"mc",wrong:["schwänzen","mogeln","versetzt werden"]},
      {q:"detention",a:"Nachsitzen",type:"mc",wrong:["Labor","Schulleiter","Flur"]},
      {q:"lunchtime",a:"Mittagspause",type:"mc",wrong:["Unterrichtsstunde","Nachsitzen","Schulausflug"]},
      {q:"silence",a:"Stille / Schweigen",type:"mc",wrong:["Lärm","Jubel","Ruhe"]},
      {q:"consequence",a:"Konsequenz / Folge",type:"mc",wrong:["Freiheit","Wahrheit","Stunde"]},
      {q:"otherwise",a:"sonst",type:"mc",wrong:["trotzdem","obwohl","außerdem"]},
      {q:"to deserve",a:"verdienen",type:"mc",wrong:["auslassen","bestrafen","handeln"]},
      {q:"to stand in line (AE)",a:"Schlange stehen",type:"mc",wrong:["ausschalten","anstehen","bestellen"]},
      {q:"hall pass",a:"Erlaubnis, sich auf dem Flur aufzuhalten",type:"mc",wrong:["Schulausflug","Stundenplan","Spickzettel"]},
      {q:"to switch off",a:"ausschalten",type:"mc",wrong:["einschalten","schwänzen","auslassen"]},
      {q:"to be about to do sth",a:"im Begriff sein, etw. zu tun",type:"mc",wrong:["etw. ablehnen","etw. beenden","etw. beginnen"]},
      {q:"to fake",a:"vortäuschen / fälschen",type:"mc",wrong:["verdienen","auslassen","bestrafen"]},
      {q:"cheat sheet",a:"Spickzettel",type:"mc",wrong:["Nachsitzen","Stundenplan","Schulausflug"]},
      {q:"attitude",a:"Haltung / Einstellung",type:"mc",wrong:["Konsequenz","Stille","Labor"]},
    ]
  },
  {
    id: "u1checkin",
    label: "Unit 1 · Check-in",
    name: "Kids in America",
    color: "#f7a26a",

  {

      {q:"head of government",a:"Regierungschef/-in",type:"mc",wrong:["Staatsoberhaupt","Minister","Kanzler"]},
      {q:"banquet",a:"Bankett",type:"mc",wrong:["Fest","Dinner","Gala"]},

// ===================== STATE =====================
let currentSection = null;
let questions = [];
let qIndex = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;
let quizDir = 'en';
let progress = {};

// ===================== STORAGE =====================
async function loadProgress() {
  try {
    const res = await window.storage.get('klett_progress');
    if (res && res.value) progress = JSON.parse(res.value);
  } catch(e) { progress = {}; }
}

async function saveProgress() {
  try { await window.storage.set('klett_progress', JSON.stringify(progress)); } catch(e) {}
}

async function resetStats() {
  if (!confirm('Fortschritt wirklich zurücksetzen?')) return;
  progress = {};
  await saveProgress();
  renderStats();
  buildHome();
}

// ===================== HELPERS =====================
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setDir(dir) {
  quizDir = dir;
  document.getElementById('dirEN').classList.toggle('active', dir === 'en');
  document.getElementById('dirDE').classList.toggle('active', dir === 'de');
}

// ===================== HOME =====================
function buildHome() {
  const grid = document.getElementById('sectionGrid');
  grid.innerHTML = '';
  SECTIONS.forEach(s => {
    const p = progress[s.id];
    let badgesHTML = '';
    if (p && p.attempts > 0) {
      if (p.perfectCount > 0)
        badgesHTML += `<span class="sc-badge perfect">🌟 Perfekt ×${p.perfectCount}</span>`;
      else
        badgesHTML += `<span class="sc-badge done">✓ Abgeschlossen</span>`;
      const cls = p.bestPct === 100 ? 'perfect' : p.bestPct >= 60 ? 'done' : 'errors';
      badgesHTML += `<span class="sc-badge ${cls}">Best: ${p.bestPct}%</span>`;
      if (p.lastWrong > 0)
        badgesHTML += `<span class="sc-badge errors">⚠ ${p.lastWrong} Fehler zuletzt</span>`;
    }
    const card = document.createElement('div');
    card.className = 'section-card';
    card.innerHTML = `
      <div class="sc-left">
        <span class="sc-label">${s.label}</span>
        <span class="sc-name">${s.name}</span>
        <span class="sc-count">${s.questions.length} Wörter</span>
        ${badgesHTML ? `<div class="sc-badges">${badgesHTML}</div>` : ''}
      </div>
      <span class="arrow">→</span>`;
    card.style.borderLeftColor = s.color;
    card.style.borderLeftWidth = '3px';
    card.onclick = () => startSection(s.id);
    grid.appendChild(card);
  });
}

function goHome() { buildHome(); showScreen('homeScreen'); }

// ===================== QUIZ =====================
function startSection(id) {
  currentSection = SECTIONS.find(s => s.id === id);
  questions = shuffle(currentSection.questions);
  qIndex = 0; correctCount = 0; wrongCount = 0;
  const dirLabel = quizDir === 'en' ? '🇬🇧→🇩🇪' : '🇩🇪→🇬🇧';
  document.getElementById('quizSectionLabel').innerHTML =
    `${currentSection.label} · ${currentSection.name}<span class="quiz-dir-badge">${dirLabel}</span>`;
  updateStats();
  showScreen('quizScreen');
  showQuestion();
}

function updateStats() {
  document.getElementById('correctCount').textContent = `✓ ${correctCount}`;
  document.getElementById('wrongCount').textContent = `✗ ${wrongCount}`;
}

function showQuestion() {
  answered = false;
  const q = questions[qIndex];
  const total = questions.length;
  const questionText = quizDir === 'en' ? q.q : q.a;
  const answerText   = quizDir === 'en' ? q.a : q.q;
  const wrongOpts = quizDir === 'en'
    ? q.wrong.slice(0, 3)
    : shuffle(questions.filter((_, i) => i !== qIndex)).slice(0, 3).map(o => o.q);

  document.getElementById('progressFill').style.width = `${(qIndex / total) * 100}%`;
  document.getElementById('questionNum').textContent = `Frage ${qIndex + 1} von ${total}`;
  document.getElementById('questionText').textContent = questionText;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').className = 'next-btn';

  const area = document.getElementById('answersArea');
  area.innerHTML = '';

  const opts = shuffle([answerText, ...wrongOpts]);
  const grid = document.createElement('div');
  grid.className = 'options-grid';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => checkMC(btn, opt, answerText, grid);
    grid.appendChild(btn);
  });
  area.appendChild(grid);
}

function checkMC(btn, chosen, correct, grid) {
  if (answered) return;
  answered = true;
  grid.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  if (chosen !== correct) { btn.classList.remove('correct'); btn.classList.add('wrong'); }
  showFeedback(chosen === correct, correct);
}

function showFeedback(isCorrect, correct) {
  if (isCorrect) {
    correctCount++;
    document.getElementById('feedback').textContent = '✓ Richtig!';
    document.getElementById('feedback').className = 'feedback correct show';
  } else {
    wrongCount++;
    document.getElementById('feedback').textContent = `✗ Richtige Antwort: ${correct}`;
    document.getElementById('feedback').className = 'feedback wrong show';
  }
  updateStats();
  document.getElementById('nextBtn').className = 'next-btn show';
}

function nextQuestion() {
  qIndex++;
  if (qIndex >= questions.length) showResult();
  else showQuestion();
}

async function showResult() {
  const total = questions.length;
  const pct = Math.round((correctCount / total) * 100);
  const isPerfect = wrongCount === 0;
  const prev = progress[currentSection.id] || { attempts: 0, perfectCount: 0, bestPct: 0 };
  const prevBest = prev.bestPct || 0;

  progress[currentSection.id] = {
    attempts: (prev.attempts || 0) + 1,
    perfectCount: (prev.perfectCount || 0) + (isPerfect ? 1 : 0),
    bestPct: Math.max(prevBest, pct),
    lastWrong: wrongCount,
  };
  await saveProgress();

  const emoji = pct === 100 ? '🌟' : pct >= 80 ? '🎉' : pct >= 60 ? '👍' : pct >= 40 ? '📚' : '💪';
  const title = pct === 100 ? 'Perfekt!' : pct >= 80 ? 'Sehr gut!' : pct >= 60 ? 'Gut gemacht!' : pct >= 40 ? 'Weiter üben!' : 'Du schaffst das!';

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = `${currentSection.label} · ${currentSection.name}`;
  document.getElementById('resultScore').textContent = pct + '%';
  document.getElementById('finalCorrect').textContent = correctCount;
  document.getElementById('finalWrong').textContent = wrongCount;
  document.getElementById('finalTotal').textContent = total;

  document.getElementById('perfectBanner').className =
    isPerfect ? 'result-perfect-banner show' : 'result-perfect-banner';

  const prevEl = document.getElementById('resultPrev');
  if (prev.attempts > 0) {
    prevEl.innerHTML = pct > prevBest
      ? `🆙 Neuer Rekord! Vorher: <span>${prevBest}%</span>`
      : `Vorheriger Rekord: <span>${prevBest}%</span> · Versuche: <span>${progress[currentSection.id].attempts}</span>`;
  } else {
    prevEl.textContent = '🎯 Erste Runde dieser Sektion!';
  }

  showScreen('resultScreen');
}

function restartQuiz() { startSection(currentSection.id); }

// ===================== STATS MODAL =====================
function openStats() { renderStats(); document.getElementById('statsOverlay').classList.add('open'); }
function closeStats() { document.getElementById('statsOverlay').classList.remove('open'); }
function closeStatsOutside(e) { if (e.target === document.getElementById('statsOverlay')) closeStats(); }

function renderStats() {
  const el = document.getElementById('statsContent');
  const entries = SECTIONS.filter(s => progress[s.id] && progress[s.id].attempts > 0);
  if (!entries.length) {
    el.innerHTML = '<div class="stats-empty">Noch keine Sektionen abgeschlossen.<br>Starte dein erstes Quiz! 🚀</div>';
    return;
  }
  el.innerHTML = entries.map(s => {
    const p = progress[s.id];
    const cls = p.bestPct === 100 ? 'green' : p.bestPct >= 60 ? 'orange' : 'red';
    const stars = p.perfectCount > 0 ? ` · 🌟×${p.perfectCount}` : '';
    const errBadge = p.lastWrong === 0
      ? `<span class="sc-badge perfect" style="font-size:11px">✓ Zuletzt fehlerfrei</span>`
      : `<span class="sc-badge errors" style="font-size:11px">⚠ ${p.lastWrong} Fehler zuletzt</span>`;
    return `<div class="stats-row">
      <div class="stats-row-left">
        <span class="stats-row-label">${s.label}</span>
        <span class="stats-row-name">${s.name}</span>
        <div class="sc-badges" style="margin-top:4px">${errBadge}</div>
      </div>
      <div class="stats-row-right">
        <span class="stats-score-big ${cls}">${p.bestPct}%</span>
        <span class="stats-attempts">${p.attempts} Versuch${p.attempts !== 1 ? 'e' : ''}${stars}</span>
      </div>
    </div>`;
  }).join('');
}

// ===================== INIT =====================
loadProgress().then(() => buildHome());
</script>
